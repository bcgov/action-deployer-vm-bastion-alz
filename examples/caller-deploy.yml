# Copy this into YOUR repo at .github/workflows/deploy-vm-bastion.yml
# It calls the composite action to provision an Azure Bastion + Linux jumpbox
# into your subscription / namespace.
#
# Prerequisite (one-time per environment): run initial-azure-setup.sh to create
# the OIDC identity, environment-scoped secrets, and Terraform state storage.
# See the deployer README "Initial setup" section.

name: Deploy VM + Bastion

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (must match a GitHub Environment + its OIDC federated credential)"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - test
          - prod
          - tools
      terraform_command:
        description: "Terraform command"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
          - plan
          - destroy

jobs:
  deploy:
    runs-on: ubuntu-24.04
    # The job sets the GitHub Environment, so environment-scoped secrets/vars
    # (created by initial-azure-setup.sh) resolve here and OIDC trusts this job.
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write # OIDC
      contents: read
    steps:
      # Checkout is required so the action can read tfvars_file from your repo.
      - uses: actions/checkout@v6

      # Pin @v1 (or a commit SHA) in real usage. The bundled infra/ ships with
      # the action at that exact ref.
      - uses: bcgov/action-deployer-vm-bastion-alz@v1
        with:
          app_name: my-app
          app_env: ${{ inputs.environment }}
          terraform_command: ${{ inputs.terraform_command }}
          # Optional: full config checked into your repo (see examples/team.tfvars)
          tfvars_file: ./config/my-app.tfvars
          # Optional override inputs (win over tfvars_file). Uncomment as needed:
          # location: Canada Central
          # vm_size: Standard_B2als_v2
          # bastion_sku: Standard
          # enable_bastion_automation: "true"
          # Terraform state storage account (variable set by initial-azure-setup.sh)
          backend_storage_account: ${{ vars.STORAGE_ACCOUNT_NAME }}
          # backend_state_key: defaults to <app_name>/<app_env>/terraform.tfstate
          # Azure identity (from environment secrets)
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          # Network details (mandatory secrets - never plain text)
          vnet_name: ${{ secrets.VNET_NAME }}
          vnet_resource_group_name: ${{ secrets.VNET_RESOURCE_GROUP_NAME }}
          vnet_address_space: ${{ secrets.VNET_ADDRESS_SPACE }}
          # Comma-separated Entra object IDs (users/groups) for jumpbox login
          vm_admin_login_principal_ids: ${{ secrets.VM_ADMIN_LOGIN_PRINCIPAL_IDS }}
