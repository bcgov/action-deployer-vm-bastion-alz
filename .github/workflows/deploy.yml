name: Deploy VM + Bastion (ALZ)

# Reusable workflow. Any team can call this to deploy the bundled Azure
# Bastion + Linux jumpbox Terraform into their own subscription / namespace.
#
# One-time setup per environment (creates the OIDC identity, environment-scoped
# secrets, and Terraform state storage):
#   https://raw.githubusercontent.com/bcgov/quickstart-azure-containers/refs/heads/main/initial-azure-setup.sh
#
# Example caller (environment-scoped secrets require secrets: inherit because a
# job that calls a reusable workflow cannot declare `environment:` itself):
#   jobs:
#     deploy:
#       uses: bcgov/action-deployer-vm-bastion-alz/.github/workflows/deploy.yml@v1
#       with:
#         app_name: my-app
#         app_env: dev
#         environment: dev
#         tfvars_file: ./config/my-app.tfvars
#       secrets: inherit

on:
  workflow_call:
    inputs:
      # --- Identity / namespace -------------------------------------------
      app_name:
        description: "Application name. Used for resource naming and the Terraform state key."
        required: true
        type: string
      app_env:
        description: "Application environment (e.g. tools, dev, test, prod)."
        required: true
        type: string
      terraform_command:
        description: "Terraform operation to run: apply, plan, or destroy."
        required: false
        default: "apply"
        type: string
      environment:
        description: "GitHub Environment to run under (for approvals / scoped secrets). Defaults to app_env."
        required: false
        default: ""
        type: string

      # --- Configuration source -------------------------------------------
      tfvars_file:
        description: "Path (in the CALLER repo) to a .tfvars file. Copied into the bundled infra as terraform.tfvars."
        required: false
        default: ""
        type: string

      # --- Common override inputs (override values from tfvars_file) -------
      location:
        description: "Azure region. Overrides tfvars when set."
        required: false
        default: ""
        type: string
      resource_group_name:
        description: "Resource group name. Defaults to <app_name>-<app_env> when empty."
        required: false
        default: ""
        type: string
      vm_size:
        description: "Jumpbox VM size. Overrides tfvars when set."
        required: false
        default: ""
        type: string
      os_disk_size_gb:
        description: "Jumpbox OS disk size in GB. Overrides tfvars when set."
        required: false
        default: ""
        type: string
      bastion_sku:
        description: "Azure Bastion SKU (Standard or Premium). Overrides tfvars when set."
        required: false
        default: ""
        type: string
      enable_bastion:
        description: "Deploy Azure Bastion (true/false). Overrides tfvars when set."
        required: false
        default: ""
        type: string
      enable_jumpbox:
        description: "Deploy the jumpbox VM (true/false). Overrides tfvars when set."
        required: false
        default: ""
        type: string
      enable_bastion_automation:
        description: "Enable Bastion delete/recreate automation runbooks (true/false). Overrides tfvars when set."
        required: false
        default: ""
        type: string
      enable_monitoring:
        description: "Create/attach a Log Analytics Workspace and enable Bastion audit diagnostics (true/false). Set false to skip the workspace entirely. Overrides tfvars when set."
        required: false
        default: ""
        type: string
      existing_log_analytics_workspace_id:
        description: "Resource ID of an existing Log Analytics Workspace (BYO LAW). When set, no workspace is created. Overrides tfvars when set."
        required: false
        default: ""
        type: string

      # --- Remote state backend -------------------------------------------
      backend_storage_account:
        description: "Storage account name holding Terraform state. Defaults to the STORAGE_ACCOUNT_NAME repo/environment variable (set by initial-azure-setup.sh) when empty."
        required: false
        default: ""
        type: string
      backend_resource_group:
        description: "Resource group of the state storage account. Defaults to VNET_RESOURCE_GROUP_NAME secret when empty."
        required: false
        default: ""
        type: string
      backend_container_name:
        description: "Blob container for Terraform state."
        required: false
        default: "tfstate"
        type: string
      backend_state_key:
        description: "State blob key. Defaults to <app_name>/<app_env>/terraform.tfstate when empty."
        required: false
        default: ""
        type: string

      # --- Runner / version -----------------------------------------------
      runs_on:
        description: "Runner label."
        required: false
        default: "ubuntu-24.04"
        type: string

    secrets:
      AZURE_CLIENT_ID:
        description: "Azure AD app (OIDC) client ID."
        required: true
      AZURE_TENANT_ID:
        description: "Azure AD tenant ID."
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: "Target Azure subscription ID."
        required: true
      VNET_NAME:
        description: "Existing spoke VNet name (from the platform team)."
        required: true
      VNET_RESOURCE_GROUP_NAME:
        description: "Resource group of the existing VNet."
        required: true
      VNET_ADDRESS_SPACE:
        description: "Address space of the existing VNet (e.g. 10.46.115.0/24)."
        required: true
      VM_ADMIN_LOGIN_PRINCIPAL_IDS:
        description: "Comma-separated Entra object IDs (users and/or groups) granted Virtual Machine Administrator Login on the jumpbox. Required: with none, nobody can Entra-SSH in. Use object IDs (GUIDs), not UPNs / emails / display names."
        required: true

permissions:
  id-token: write # Required for OIDC authentication
  contents: read

jobs:
  deploy:
    runs-on: ${{ inputs.runs_on }}
    environment: ${{ inputs.environment != '' && inputs.environment || inputs.app_env }}
    name: Terraform ${{ inputs.terraform_command }} (${{ inputs.app_name }}-${{ inputs.app_env }})
    steps:
      - name: Checkout deployer (bundled infra)
        uses: actions/checkout@v6
        with:
          repository: bcgov/action-deployer-vm-bastion-alz
          # job_workflow_sha is the exact commit of THIS reusable workflow file,
          # so the bundled infra/ always matches the @ref the caller pinned.
          # Index notation is used because the Actions VS Code extension schema
          # does not yet list job_workflow_sha and flags dot access as invalid;
          # the value is identical to ${{ github.job_workflow_sha }}.
          ref: ${{ github['job_workflow_sha'] }}

      - name: Fetch tfvars from caller repo
        if: ${{ inputs.tfvars_file != '' }}
        shell: bash
        env:
          # In a reusable workflow these contexts refer to the CALLER repo/ref,
          # and GITHUB_TOKEN is scoped to the caller, so we fetch their tfvars.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CALLER_REPOSITORY: ${{ github.repository }}
          CALLER_REF: ${{ github.head_ref || github.ref_name || github.event.repository.default_branch }}
          TFVARS_FILE_INPUT: ${{ inputs.tfvars_file }}
          DEPLOYER_INFRA_DIR: "${{ github.workspace }}/infra"
        run: |
          chmod +x ./.github/scripts/fetch-tfvars.sh
          ./.github/scripts/fetch-tfvars.sh

      - name: Azure CLI Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Run Terraform
        shell: bash
        env:
          CI: "true"
          ARM_USE_OIDC: "true"
          DEPLOYER_INFRA_DIR: "${{ github.workspace }}/infra"
          TERRAFORM_COMMAND: ${{ inputs.terraform_command }}
          # Backend configuration for Terraform state
          BACKEND_RESOURCE_GROUP: ${{ inputs.backend_resource_group != '' && inputs.backend_resource_group || secrets.VNET_RESOURCE_GROUP_NAME }}
          BACKEND_STORAGE_ACCOUNT: ${{ inputs.backend_storage_account != '' && inputs.backend_storage_account || vars.STORAGE_ACCOUNT_NAME }}
          BACKEND_CONTAINER_NAME: ${{ inputs.backend_container_name }}
          BACKEND_STATE_KEY: ${{ inputs.backend_state_key != '' && inputs.backend_state_key || format('{0}/{1}/terraform.tfstate', inputs.app_name, inputs.app_env) }}
          # Core identity (env vars; tfvars_file can override these)
          TF_VAR_app_name: ${{ inputs.app_name }}
          TF_VAR_app_env: ${{ inputs.app_env }}
          TF_VAR_resource_group_name: ${{ inputs.resource_group_name != '' && inputs.resource_group_name || format('{0}-{1}', inputs.app_name, inputs.app_env) }}
          TF_VAR_common_tags: >-
            {"environment":"${{ inputs.app_env }}","app_env":"${{ inputs.app_env }}","repo_name":"${{ github.event.repository.name }}","managed_by":"Terraform"}
          # Sensitive variables from secrets
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_vnet_name: ${{ secrets.VNET_NAME }}
          TF_VAR_vnet_resource_group_name: ${{ secrets.VNET_RESOURCE_GROUP_NAME }}
          TF_VAR_vnet_address_space: ${{ secrets.VNET_ADDRESS_SPACE }}
          # Comma-separated object IDs; run-deploy.sh validates them and converts
          # the value into the Terraform list(string) TF_VAR it expects.
          VM_ADMIN_LOGIN_PRINCIPAL_IDS: ${{ secrets.VM_ADMIN_LOGIN_PRINCIPAL_IDS }}
          # Override inputs -> applied as -var (highest precedence) when non-empty
          OVERRIDE_location: ${{ inputs.location }}
          OVERRIDE_vm_size: ${{ inputs.vm_size }}
          OVERRIDE_os_disk_size_gb: ${{ inputs.os_disk_size_gb }}
          OVERRIDE_bastion_sku: ${{ inputs.bastion_sku }}
          OVERRIDE_enable_bastion: ${{ inputs.enable_bastion }}
          OVERRIDE_enable_jumpbox: ${{ inputs.enable_jumpbox }}
          OVERRIDE_enable_bastion_automation: ${{ inputs.enable_bastion_automation }}
          OVERRIDE_enable_monitoring: ${{ inputs.enable_monitoring }}
          OVERRIDE_existing_log_analytics_workspace_id: ${{ inputs.existing_log_analytics_workspace_id }}
        run: |
          chmod +x ./.github/scripts/run-deploy.sh ./infra/deploy-terraform.sh
          ./.github/scripts/run-deploy.sh
