name: Release

on:
  push:
    branches:
      - main

# Queue releases; never cancel in-progress to keep tags consistent.
concurrency:
  group: release
  cancel-in-progress: false

# Deny-all baseline — the release job steps up only what it needs.
permissions: {}

jobs:
  release:
    name: Tag and release
    runs-on: ubuntu-24.04
    permissions:
      contents: write   # push tags + create release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history required for tag discovery

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v

      - name: Push floating major tag
        env:
          NEW_TAG: ${{ steps.tag.outputs.new_tag }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          MAJOR_TAG="${NEW_TAG%%.*}"   # v1.2.3 → v1
          git tag -f "$MAJOR_TAG"
          git push origin -f "$MAJOR_TAG"

      - name: Build release notes
        env:
          NEW_TAG:    ${{ steps.tag.outputs.new_tag }}
          CHANGELOG:  ${{ steps.tag.outputs.changelog }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          SHORT_SHA="${COMMIT_SHA:0:7}"
          MAJOR_TAG="${NEW_TAG%%.*}"   # v1.2.3 → v1

          {
            printf '%s\n\n' "$CHANGELOG"
            printf -- '---\n\n'
            printf '### Using this action\n\n'

            printf 'Pin to the **exact commit** (most secure):\n'
            printf '```yaml\n'
            printf 'uses: bcgov/action-deployer-vm-bastion-alz@%s\n' "$COMMIT_SHA"
            printf '```\n\n'

            printf 'Pin to this **patch release**:\n'
            printf '```yaml\n'
            printf 'uses: bcgov/action-deployer-vm-bastion-alz@%s\n' "$NEW_TAG"
            printf '```\n\n'

            printf 'Pin to the **major version** (receives non-breaking updates automatically):\n'
            printf '```yaml\n'
            printf 'uses: bcgov/action-deployer-vm-bastion-alz@%s\n' "$MAJOR_TAG"
            printf '```\n\n'

            printf '> **Full SHA:** `%s`\n' "$COMMIT_SHA"
            printf '> **Short SHA:** `%s`\n' "$SHORT_SHA"
          } > release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_TAG:  ${{ steps.tag.outputs.new_tag }}
        run: |
          set -euo pipefail
          gh release create "$NEW_TAG" \
            --title "$NEW_TAG" \
            --notes-file release_notes.md \
            --latest

  # Single aggregator — make only this job a required status check in branch
  # protection so renaming upstream jobs never requires touching the ruleset.
  results:
    if: always()
    needs: [release]
    runs-on: ubuntu-24.04
    steps:
      - name: Check release result
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
