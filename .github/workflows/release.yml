name: Release

on:
  push:
    branches:
      - main

# Queue releases; never cancel in-progress to keep tags consistent.
concurrency:
  group: release
  cancel-in-progress: false

# Deny-all baseline — the release job steps up only what it needs.
permissions: {}

jobs:
  release:
    name: Tag and release
    runs-on: ubuntu-24.04
    permissions:
      contents: write # push tags + create release
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history required for changelog generation

      # Compute the next version + release notes from Conventional Commits.
      # `main` is a protected branch (PRs + required checks) so CI cannot push a
      # commit to it — run in compute-only mode: no commit, no CHANGELOG.md file,
      # no branch push. The action still creates the version tag locally and sets
      # its outputs; we push the tag (a refs/tags/* push, which protection allows)
      # and publish the GitHub Release below. The Releases page is the changelog.
      - name: Compute next version and release notes
        id: changelog
        uses: TriPSs/conventional-changelog-action@ee43def3241429afddab215ba89090cbf64fb45c # v6.4.0
        with:
          preset: "conventionalcommits"
          github-token: ${{ github.token }}
          tag-prefix: v
          output-file: "false"   # don't write/commit a CHANGELOG.md
          skip-commit: "true"    # don't commit to protected main
          git-push: "false"      # don't push to protected main; we push the tag below
          release-count: 10
          git-user-name: "github-actions[bot]"
          git-user-email: "github-actions[bot]@users.noreply.github.com"

      - name: Push tags
        if: steps.changelog.outputs.skipped == 'false'
        env:
          NEW_TAG: ${{ steps.changelog.outputs.tag }}
        run: |
          set -euo pipefail
          MAJOR_TAG="${NEW_TAG%%.*}"       # v1.2.3 → v1
          git push origin "$NEW_TAG"       # version tag created locally by the action
          git tag -f "$MAJOR_TAG"
          git push origin -f "$MAJOR_TAG"  # floating major

      - name: Build release notes
        if: steps.changelog.outputs.skipped == 'false'
        env:
          NEW_TAG: ${{ steps.changelog.outputs.tag }}
          CHANGELOG: ${{ steps.changelog.outputs.clean_changelog }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          SHORT_SHA="${COMMIT_SHA:0:7}"
          MAJOR_TAG="${NEW_TAG%%.*}"   # v1.2.3 → v1

          {
            printf '%s\n\n' "$CHANGELOG"
            printf -- '---\n\n'
            printf '### Using this action\n\n'

            printf 'Pin to the **exact commit** (most secure):\n'
            printf '```yaml\n'
            printf 'uses: bcgov/action-deployer-vm-bastion-alz@%s\n' "$COMMIT_SHA"
            printf '```\n\n'

            printf 'Pin to this **patch release**:\n'
            printf '```yaml\n'
            printf 'uses: bcgov/action-deployer-vm-bastion-alz@%s\n' "$NEW_TAG"
            printf '```\n\n'

            printf 'Pin to the **major version** (receives non-breaking updates automatically):\n'
            printf '```yaml\n'
            printf 'uses: bcgov/action-deployer-vm-bastion-alz@%s\n' "$MAJOR_TAG"
            printf '```\n\n'

            printf '> **Full SHA:** `%s`\n' "$COMMIT_SHA"
            printf '> **Short SHA:** `%s`\n' "$SHORT_SHA"
          } > release_notes.md

      - name: Create GitHub Release
        if: steps.changelog.outputs.skipped == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_TAG: ${{ steps.changelog.outputs.tag }}
        run: |
          set -euo pipefail
          gh release create "$NEW_TAG" \
            --title "$NEW_TAG" \
            --notes-file release_notes.md \
            --latest

  # Single aggregator — make only this job a required status check in branch
  # protection so renaming upstream jobs never requires touching the ruleset.
  results:
    if: always()
    needs: [release]
    runs-on: ubuntu-24.04
    steps:
      - name: Check release result
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
